name: Remove Ephemeral Environment

on:
  delete:
    branches:
      - 'build/*'
      - 'chore/*'
      - 'ci/*'
      - 'dependabot/*'
      - 'docs/*'
      - 'feat/*'
      - 'fix/*'
      - 'perf/*'
      - 'refactor/*'
      - 'revert/*'
      - 'style/*'
      - 'test/*'

jobs:
  remove-deployment:
    name: Remove ephemeral deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/setup
      - name: Remove ephemeral environment
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.EPHEMERAL_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.EPHEMERAL_AWS_SECRET_ACCESS_KEY }}
        run: |
          STAGE_NAME=$(echo "${{ github.event.ref }}" | tr '/' '-')
          echo "Removing stage: $STAGE_NAME"
          pnpm sst remove --stage "$STAGE_NAME"

  delete-neon-branch:
    name: Delete Neon branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Compute branch name
        id: branch
        run: |
          BRANCH_NAME=$(echo "${{ github.event.ref }}" | tr '/' '-')
          echo "name=$BRANCH_NAME" >> $GITHUB_OUTPUT
      - name: Delete Neon branch
        uses: ./.github/actions/neon-cleanup
        with:
          api-key: ${{ secrets.NEON_API_KEY }}
          project-id: ${{ secrets.NEON_PROJECT_ID }}
          branch-name: ${{ steps.branch.outputs.name }}

  delete-github-environment:
    name: Delete GitHub environment
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - name: Delete GitHub environment
        run: |
          ENV_NAME=$(echo "${{ github.event.ref }}" | tr '/' '-')
          echo "Deleting GitHub environment: $ENV_NAME"
          gh api \
            --method DELETE \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/environments/$ENV_NAME

  delete-branch-caches:
    name: Delete branch caches
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - name: Delete caches for deleted branch
        run: |
          BRANCH="${{ github.event.ref }}"
          echo "Deleting caches for branch: $BRANCH"
          gh api --paginate \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/actions/caches?ref=refs/heads/$BRANCH \
            --jq '.actions_caches[].id' | \
          while read -r CACHE_ID; do
            echo "Deleting cache $CACHE_ID"
            gh api \
              --method DELETE \
              -H "Accept: application/vnd.github+json" \
              /repos/${{ github.repository }}/actions/caches/$CACHE_ID
          done
