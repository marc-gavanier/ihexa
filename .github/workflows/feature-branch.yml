---
name: Feature branch

on:
  push:
    branches:
      - 'build/*'
      - 'chore/*'
      - 'ci/*'
      - 'dependabot/*'
      - 'docs/*'
      - 'feat/*'
      - 'fix/*'
      - 'perf/*'
      - 'refactor/*'
      - 'revert/*'
      - 'style/*'
      - 'test/*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-check:
    name: Lint code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/setup
      - name: Lint code
        run: pnpm lint:code:ci --reporter=github

  commit-check:
    name: Lint commits
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup
        uses: ./.github/actions/setup
      - name: Lint commit
        run: pnpm lint:commit

  architecture-check:
    name: Lint architecture
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/setup
      - name: Generate implementations
        run: pnpm generate:implementations
      - name: Lint architecture
        run: pnpm lint:architecture

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/setup
      - name: Generate implementations
        run: pnpm generate:implementations
      - name: Run tests
        run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/setup
      - name: Build cache
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
      - name: Build
        run: pnpm build
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: next-build
          include-hidden-files: true
          path: .next

  e2e:
    name: E2E tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/setup
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps
      - name: Generate implementations
        run: pnpm generate:implementations
      - name: Run E2E tests
        run: pnpm exec playwright test
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-results
          path: |
            playwright-report/
            test-results/
          retention-days: 30

  cucumber:
    name: Integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ihexa
          POSTGRES_PASSWORD: ihexa
          POSTGRES_DB: ihexa
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ihexa"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_USER: ihexa
      DATABASE_PASSWORD: ihexa
      DATABASE_PORT: 5432
      DATABASE_NAME: ihexa
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/setup
      - name: Run migrations
        run: pnpm db:migrate
      - name: Run cucumber
        run: pnpm test:cucumber@prod

  ephemeral-env-name:
    name: Ephemeral environment name
    runs-on: ubuntu-latest
    outputs:
      env-name: ${{ steps.export.outputs.env-name }}
    steps:
      - name: Format environment name
        id: export
        run: |
          ENV_NAME=$(echo "${{ github.ref_name }}" | tr '/' '-')
          echo "env-name=$ENV_NAME" >> $GITHUB_OUTPUT

  setup-database:
    name: Setup ephemeral database
    runs-on: ubuntu-latest
    needs:
      - ephemeral-env-name
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/setup
      - name: Install Pulumi
        run: curl -fsSL https://get.pulumi.com | sh && echo "$HOME/.pulumi/bin" >> $GITHUB_PATH
      - name: Create Neon branch
        uses: ./.github/actions/neon-branch
        with:
          api-key: ${{ secrets.NEON_API_KEY }}
          project-id: ${{ secrets.NEON_PROJECT_ID }}
          branch-name: ${{ needs.ephemeral-env-name.outputs.env-name }}
      - name: Run migrations
        run: pnpm db:migrate
      - name: Set SST database secret
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.EPHEMERAL_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.EPHEMERAL_AWS_SECRET_ACCESS_KEY }}
        run: pnpm sst secret set DatabaseUrl "$DATABASE_URL" --stage "${{ needs.ephemeral-env-name.outputs.env-name }}"

  deploy:
    name: Deploy to ephemeral environment
    needs:
      - ephemeral-env-name
      - setup-database
    uses: ./.github/workflows/deploy.reusable.yml
    with:
      stage: ${{ needs.ephemeral-env-name.outputs.env-name }}
      environment: ${{ needs.ephemeral-env-name.outputs.env-name }}
      env-type: ephemeral
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.EPHEMERAL_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.EPHEMERAL_AWS_SECRET_ACCESS_KEY }}
