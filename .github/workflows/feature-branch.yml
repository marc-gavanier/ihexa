---
name: Feature branch

on:
  push:
    branches:
      - 'build/*'
      - 'chore/*'
      - 'ci/*'
      - 'dependabot/*'
      - 'docs/*'
      - 'feat/*'
      - 'fix/*'
      - 'perf/*'
      - 'refactor/*'
      - 'revert/*'
      - 'style/*'
      - 'test/*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-check:
    name: Code check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/setup
      - name: Lint code
        run: pnpm lint:code:ci --reporter=github

  commit-check:
    name: Commit check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup
        uses: ./.github/actions/setup
      - name: Lint commit
        run: pnpm lint:commit

  architecture-check:
    name: Architecture check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/setup
      - name: Generate implementations
        run: pnpm generate:implementations
      - name: Lint architecture
        run: pnpm lint:architecture

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/setup
      - name: Generate implementations
        run: pnpm generate:implementations
      - name: Run tests
        run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/setup
      - name: Build cache
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
      - name: Build
        run: pnpm build
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: next-build
          include-hidden-files: true
          path: .next

  e2e:
    name: E2E
    needs: build
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2
    env:
      HOME: /root
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: next-build
          path: .next
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: latest
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Start server
        run: pnpm start &
      - name: Run E2E tests
        run: pnpm exec playwright test
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-results
          path: |
            playwright-report/
            test-results/
          retention-days: 30

  cucumber:
    name: Cucumber scenarios
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: ihexa
          POSTGRES_PASSWORD: ihexa
          POSTGRES_DB: ihexa
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U ihexa"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_USER: ihexa
      DATABASE_PASSWORD: ihexa
      DATABASE_PORT: 5432
      DATABASE_NAME: ihexa
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/setup
      - name: Run migrations
        run: pnpm db:migrate
      - name: Run cucumber
        run: pnpm test:cucumber@prod

  ephemeral-env-name:
    name: Ephemeral environment name
    runs-on: ubuntu-latest
    outputs:
      env-name: ${{ steps.export.outputs.env-name }}
    steps:
      - name: Format environment name
        id: export
        run: |
          ENV_NAME=$(echo "${{ github.ref_name }}" | tr '/' '-')
          echo "env-name=$ENV_NAME" >> $GITHUB_OUTPUT

  neon:
    name: Setup Neon branch
    runs-on: ubuntu-latest
    needs:
      - ephemeral-env-name
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup
        uses: ./.github/actions/setup
      - name: Create Neon branch
        id: neon
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          BRANCH_NAME="${{ needs.ephemeral-env-name.outputs.env-name }}"

          EXISTING_BRANCH=$(curl -s -X GET \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches" \
            -H "Authorization: Bearer $NEON_API_KEY" \
            -H "Content-Type: application/json" | jq -r ".branches[] | select(.name == \"$BRANCH_NAME\") | .id")

          if [ -n "$EXISTING_BRANCH" ]; then
            echo "Branch $BRANCH_NAME already exists with ID: $EXISTING_BRANCH"
            BRANCH_ID="$EXISTING_BRANCH"

            ENDPOINT_ID=$(curl -s -X GET \
              "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/endpoints" \
              -H "Authorization: Bearer $NEON_API_KEY" | jq -r ".endpoints[] | select(.branch_id == \"$BRANCH_ID\") | .id")

            if [ -z "$ENDPOINT_ID" ]; then
              echo "No endpoint found, creating one..."
              curl -s -X POST \
                "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/endpoints" \
                -H "Authorization: Bearer $NEON_API_KEY" \
                -H "Content-Type: application/json" \
                -d "{\"endpoint\": {\"branch_id\": \"$BRANCH_ID\", \"type\": \"read_write\"}}"
              sleep 5
            fi
          else
            echo "Creating new branch: $BRANCH_NAME"
            RESPONSE=$(curl -s -X POST \
              "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches" \
              -H "Authorization: Bearer $NEON_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"branch\": {\"name\": \"$BRANCH_NAME\"}, \"endpoints\": [{\"type\": \"read_write\"}]}")
            BRANCH_ID=$(echo "$RESPONSE" | jq -r '.branch.id')
            echo "Created branch with ID: $BRANCH_ID"
            sleep 5
          fi

          CONNECTION_URI=$(curl -s -X GET \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/connection_uri?branch_id=$BRANCH_ID&database_name=neondb&role_name=neondb_owner" \
            -H "Authorization: Bearer $NEON_API_KEY" | jq -r '.uri')

          if [ -z "$CONNECTION_URI" ] || [ "$CONNECTION_URI" = "null" ]; then
            echo "Failed to get connection URI"
            exit 1
          fi
          echo "Connection URI retrieved successfully"
          echo "DATABASE_URL=$CONNECTION_URI" >> $GITHUB_ENV
      - name: Run database migrations
        run: pnpm db:migrate
      - name: Set SST database secret
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.EPHEMERAL_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.EPHEMERAL_AWS_SECRET_ACCESS_KEY }}
        run: pnpm sst secret set DatabaseUrl "$DATABASE_URL" --stage "${{ needs.ephemeral-env-name.outputs.env-name }}"

  deploy:
    name: Deploy to ephemeral environment
    needs:
      - ephemeral-env-name
      - neon
    uses: ./.github/workflows/deploy.reusable.yml
    with:
      stage: ${{ needs.ephemeral-env-name.outputs.env-name }}
      environment: ${{ needs.ephemeral-env-name.outputs.env-name }}
      env-type: ephemeral
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.EPHEMERAL_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.EPHEMERAL_AWS_SECRET_ACCESS_KEY }}
